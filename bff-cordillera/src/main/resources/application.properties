spring.application.name=bff-cordillera
server.port=8084

microservicio.datos.url=${MICROSERVICIO_DATOS_URL:http://localhost:8083}
microservicio.kpi.url=${MICROSERVICIO_KPI_URL:http://localhost:8082}
microservicio.usuarios.url=${MICROSERVICIO_USUARIOS_URL:http://localhost:8081}

resilience4j.circuitbreaker.instances.ms-kpi.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ms-kpi.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ms-kpi.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ms-kpi.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ms-kpi.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.ms-kpi.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.ms-datos.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ms-datos.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ms-datos.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ms-datos.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ms-datos.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.ms-datos.permittedNumberOfCallsInHalfOpenState=3

management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always