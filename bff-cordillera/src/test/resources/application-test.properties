# ========================================================
# ENTORNO DE PRUEBAS (TEST) - BFF Grupo Cordillera
# ========================================================

# Nombre de la aplicación en entorno de test
spring.application.name=bff-cordillera-test

# Usar un puerto aleatorio (0) evita colisiones si tienes otros servicios levantados
server.port=0

# ========================================================
# MOCKS DE MICROSERVICIOS DOWNSTREAM
# ========================================================
# URLs ficticias o locales para que los tests no golpeen producción
microservicio.kpi.url=http://localhost:8081
microservicio.datos.url=http://localhost:8082

# ========================================================
# CONFIGURACIÓN ACELERADA DE CIRCUIT BREAKER (RESILIENCE4J)
# ========================================================
# Reducimos los tiempos y tamaños de ventana para que los tests corran rápido
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.ms-kpi.base-config=default
resilience4j.circuitbreaker.instances.ms-datos.base-config=default

# ========================================================
# LOGS PARA PRUEBAS
# ========================================================
# INFO es ideal para ver los flujos de los tests sin saturar la consola
logging.level.com.cordillera.bffcordillera=INFO
logging.level.org.springframework.test=WARN